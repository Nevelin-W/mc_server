# ══════════════════════════════════════════════
# Scheduled Tasks (Backups + Optional Downtime)
# ══════════════════════════════════════════════
name: "⏰ Scheduled Tasks"

on:
  schedule:
    # Backup every 3 hours
    - cron: "0 */3 * * *"
    # Weekly backup verification – Sundays 05:00 UTC
    - cron: "0 5 * * 0"

  workflow_dispatch:
    inputs:
      task:
        description: "Task to run"
        required: true
        type: choice
        options:
          - backup
          - verify

permissions:
  contents: read

jobs:
  identify-task:
    runs-on: ubuntu-latest
    outputs:
      task: ${{ steps.task.outputs.task }}
    steps:
      - id: task
        run: |
          if [[ -n "${{ github.event.inputs.task }}" ]]; then
            echo "task=${{ github.event.inputs.task }}" >> "$GITHUB_OUTPUT"
          elif [[ "${{ github.event.schedule }}" == "0 5 * * 0" ]]; then
            echo "task=verify" >> "$GITHUB_OUTPUT"
          else
            echo "task=backup" >> "$GITHUB_OUTPUT"
          fi

  scheduled-backup:
    needs: identify-task
    if: needs.identify-task.outputs.task == 'backup'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/mc_server
          chmod 600 ~/.ssh/mc_server
          if [[ -f server_ip.txt ]] && [[ -s server_ip.txt ]]; then
            SERVER_IP=$(cat server_ip.txt)
          else
            echo "No server IP (VM is parked). Skipping backup."
            exit 0
          fi
          echo "SERVER_IP=${SERVER_IP}" >> "$GITHUB_ENV"
          ssh-keyscan -H "${SERVER_IP}" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Run backup
        run: |
          SSH="ssh -i ~/.ssh/mc_server -o ConnectTimeout=10 root@${SERVER_IP}"
          ${SSH} "sudo -u minecraft /opt/minecraft/backups/scripts/backup.sh" || echo "Backup failed or server unreachable"

  scheduled-verify:
    needs: identify-task
    if: needs.identify-task.outputs.task == 'verify'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/mc_server
          chmod 600 ~/.ssh/mc_server
          if [[ -f server_ip.txt ]] && [[ -s server_ip.txt ]]; then
            SERVER_IP=$(cat server_ip.txt)
          else
            echo "No server IP (VM is parked). Skipping verification."
            exit 0
          fi
          echo "SERVER_IP=${SERVER_IP}" >> "$GITHUB_ENV"
          ssh-keyscan -H "${SERVER_IP}" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Verify backups
        run: |
          SSH="ssh -i ~/.ssh/mc_server -o ConnectTimeout=10 root@${SERVER_IP}"
          ${SSH} "sudo -u minecraft /opt/minecraft/backups/scripts/verify-backup.sh" || echo "::warning::Backup verification failed!"
