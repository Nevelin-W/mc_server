# ══════════════════════════════════════════════
# Manual Backup / Restore
# ══════════════════════════════════════════════
name: "💾 Backup & Restore"

on:
  workflow_dispatch:
    inputs:
      action:
        description: "Action"
        required: true
        type: choice
        options:
          - backup
          - list-snapshots
          - restore
      snapshot_id:
        description: "Snapshot ID (for restore, leave empty for latest)"
        required: false
        default: "latest"
        type: string
      reason:
        description: "Reason for backup/restore"
        required: false
        default: "manual"
        type: string

permissions:
  contents: read

jobs:
  backup:
    name: ${{ github.event.inputs.action }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Write SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/mc_server
          chmod 600 ~/.ssh/mc_server
          if [[ -f server_ip.txt ]]; then
            SERVER_IP=$(cat server_ip.txt)
          else
            echo "::error::No server IP found. Run provision first."
            exit 1
          fi
          echo "SERVER_IP=${SERVER_IP}" >> "$GITHUB_ENV"
          ssh-keyscan -H "${SERVER_IP}" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Execute ${{ github.event.inputs.action }}
        run: |
          SSH="ssh -i ~/.ssh/mc_server root@${SERVER_IP}"

          case "${{ github.event.inputs.action }}" in
            backup)
              echo "Starting backup (reason: ${{ github.event.inputs.reason }})..."
              ${SSH} "sudo -u minecraft /opt/minecraft/backups/scripts/backup.sh"
              ;;
            list-snapshots)
              ${SSH} "sudo -u minecraft bash -c 'source /opt/minecraft/backups/.restic-env && restic snapshots'"
              ;;
            restore)
              echo "⚠️ Starting restore of snapshot: ${{ github.event.inputs.snapshot_id }}"
              echo "RESTORE" | ${SSH} "sudo -u minecraft /opt/minecraft/backups/scripts/restore.sh ${{ github.event.inputs.snapshot_id }}"
              ;;
          esac

      - name: Get backup status
        if: github.event.inputs.action == 'backup'
        run: |
          SSH="ssh -i ~/.ssh/mc_server root@${SERVER_IP}"
          ${SSH} "cat /opt/minecraft/backups/.last-backup-status 2>/dev/null || echo 'No status file'"

      - name: Summary
        run: |
          echo "## 💾 ${{ github.event.inputs.action }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Action:** ${{ github.event.inputs.action }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Reason:** ${{ github.event.inputs.reason }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Snapshot:** ${{ github.event.inputs.snapshot_id }}" >> "$GITHUB_STEP_SUMMARY"
