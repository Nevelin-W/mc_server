# ═══════════════════════════════════════════════
# Modpack Catalog
# ═══════════════════════════════════════════════
# Add modpacks here. Each entry defines everything needed
# to install and run that modpack on the server.
#
# To switch modpacks:
#   1. Add/verify the entry below
#   2. Run the "Change Modpack" workflow, OR
#   3. Set modpack_name in ansible/group_vars/all.yml and push
#
# Required fields per modpack:
#   display_name       – Human-readable name
#   loader             – forge, fabric, neoforge, quilt
#   minecraft_version  – e.g., 1.20.1
#   loader_version     – Loader build version
#   download_url       – Direct URL to server pack zip
#   java_version       – Required Java version (17 or 21)
#   min_memory / max_memory – JVM heap sizing
#
# Optional fields:
#   curseforge_project_id  – CurseForge numeric project ID
#   curseforge_file_id     – Specific file ID for pinning
#   description            – What this pack is about
#   recommended_server     – Hetzner server type

modpacks:
  # ── Prominence II RPG: Hasturian Era ─────────
  prominence-2-rpg:
