---
# ══════════════════════════════════════════════
# Monitoring Role – Node Exporter + Promtail
# ══════════════════════════════════════════════

- name: Skip monitoring if disabled
  meta: end_play
  when: not monitoring_enabled

# ── Node Exporter ────────────────────────────
- name: Download node_exporter
  get_url:
    url: "https://github.com/prometheus/node_exporter/releases/download/v{{ node_exporter_version }}/node_exporter-{{ node_exporter_version }}.linux-amd64.tar.gz"
    dest: /tmp/node_exporter.tar.gz
    mode: "0644"

- name: Extract node_exporter
  unarchive:
    src: /tmp/node_exporter.tar.gz
    dest: /opt/
    remote_src: true
    creates: "/opt/node_exporter-{{ node_exporter_version }}.linux-amd64"

- name: Symlink node_exporter binary
  file:
    src: "/opt/node_exporter-{{ node_exporter_version }}.linux-amd64/node_exporter"
    dest: /usr/local/bin/node_exporter
    state: link

- name: Deploy node_exporter systemd unit
  copy:
    dest: /etc/systemd/system/node_exporter.service
    content: |
      [Unit]
      Description=Prometheus Node Exporter
      After=network.target

      [Service]
      Type=simple
      User=nobody
      ExecStart=/usr/local/bin/node_exporter
      Restart=on-failure

      [Install]
      WantedBy=multi-user.target
    mode: "0644"
  notify: restart node_exporter

- name: Enable and start node_exporter
  systemd:
    name: node_exporter
    enabled: true
    state: started
    daemon_reload: true

# ── Promtail (log shipping to Grafana Cloud) ─
- name: Download promtail
  get_url:
    url: "https://github.com/grafana/loki/releases/download/v{{ promtail_version }}/promtail-linux-amd64.zip"
    dest: /tmp/promtail.zip
    mode: "0644"
  when: grafana_cloud_url | length > 0

- name: Extract promtail
  unarchive:
    src: /tmp/promtail.zip
    dest: /usr/local/bin/
    remote_src: true
    creates: /usr/local/bin/promtail-linux-amd64
  when: grafana_cloud_url | length > 0

- name: Rename promtail binary
  command: mv /usr/local/bin/promtail-linux-amd64 /usr/local/bin/promtail
  args:
    creates: /usr/local/bin/promtail
  when: grafana_cloud_url | length > 0

- name: Deploy promtail config
  template:
    src: promtail.yml.j2
    dest: /etc/promtail.yml
    mode: "0644"
  notify: restart promtail
  when: grafana_cloud_url | length > 0

- name: Deploy promtail systemd unit
  copy:
    dest: /etc/systemd/system/promtail.service
    content: |
      [Unit]
      Description=Promtail Log Agent
      After=network.target

      [Service]
      Type=simple
      ExecStart=/usr/local/bin/promtail -config.file=/etc/promtail.yml
      Restart=on-failure
      User=root

      [Install]
      WantedBy=multi-user.target
    mode: "0644"
  notify: restart promtail
  when: grafana_cloud_url | length > 0

- name: Enable and start promtail
  systemd:
    name: promtail
    enabled: true
    state: started
    daemon_reload: true
  when: grafana_cloud_url | length > 0
