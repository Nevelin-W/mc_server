---
# ── Forge modpack installation ───────────────
# Handles CurseForge modpacks that use Forge loader

- name: Check if server jar already exists
  stat:
    path: "{{ minecraft_home }}/server/forge-server.jar"
  register: forge_jar

- name: Create modpack download directory
  file:
    path: "{{ minecraft_home }}/modpack-staging"
    state: directory
    owner: "{{ minecraft_user }}"
    group: "{{ minecraft_group }}"
    mode: "0755"

# ── Download server pack ─────────────────────
- name: Download modpack server files
  get_url:
    url: "{{ modpack_download_url }}"
    dest: "{{ minecraft_home }}/modpack-staging/server-pack.zip"
    owner: "{{ minecraft_user }}"
    group: "{{ minecraft_group }}"
    mode: "0644"
  when: modpack_download_url | length > 0

- name: Extract server pack
  unarchive:
    src: "{{ minecraft_home }}/modpack-staging/server-pack.zip"
    dest: "{{ minecraft_home }}/server/"
    remote_src: true
    owner: "{{ minecraft_user }}"
    group: "{{ minecraft_group }}"
    creates: "{{ minecraft_home }}/server/forge-{{ modpack_minecraft_version }}-{{ modpack_loader_version }}.jar"
  when: modpack_download_url | length > 0

# ── Install Forge if not already present ─────
- name: Download Forge installer
  get_url:
    url: "https://maven.minecraftforge.net/net/minecraftforge/forge/{{ modpack_minecraft_version }}-{{ modpack_loader_version }}/forge-{{ modpack_minecraft_version }}-{{ modpack_loader_version }}-installer.jar"
    dest: "{{ minecraft_home }}/modpack-staging/forge-installer.jar"
    owner: "{{ minecraft_user }}"
    group: "{{ minecraft_group }}"
    mode: "0644"
  when:
    - modpack_loader_version | length > 0
    - not forge_jar.stat.exists

- name: Run Forge installer
  become_user: "{{ minecraft_user }}"
  command: >
    java -jar {{ minecraft_home }}/modpack-staging/forge-installer.jar
    --installServer
  args:
    chdir: "{{ minecraft_home }}/server"
    creates: "{{ minecraft_home }}/server/libraries"
  when:
    - modpack_loader_version | length > 0
    - not forge_jar.stat.exists

# ── Detect the run script/jar ────────────────
- name: Find forge run script
  find:
    paths: "{{ minecraft_home }}/server"
    patterns: "run.sh,run.bat"
  register: forge_run_scripts

- name: Find forge server jar
  find:
    paths: "{{ minecraft_home }}/server"
    patterns: "forge-*-shim.jar,forge-*-server.jar,forge-*.jar"
    excludes: "*-installer.jar"
  register: forge_jars

- name: Set forge jar path
  set_fact:
    forge_jar_path: "{{ forge_jars.files | sort(attribute='path') | last | default({}) | json_query('path') }}"
  when: forge_jars.matched > 0

- name: Record installed modpack version
  copy:
    dest: "{{ minecraft_home }}/server/.modpack-version"
    content: |
      modpack={{ modpack_name }}
      loader={{ modpack_loader }}
      minecraft_version={{ modpack_minecraft_version }}
      loader_version={{ modpack_loader_version }}
      installed_at={{ ansible_date_time.iso8601 }}
    owner: "{{ minecraft_user }}"
    group: "{{ minecraft_group }}"
    mode: "0644"
